apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: billing-account-lifecycle
spec:
  description: |
    Tests the BillingAccount lifecycle including:
    - Creating an account transitions to Ready
    - CRD validation rejects invalid currency codes
    - CurrencyCode is immutable after activation
    - Contact info and payment terms are configurable

  steps:
    - name: create-account
      description: Create a BillingAccount. Should become Ready.
      try:
        - create:
            file: 01-create-account.yaml
        - assert:
            timeout: 30s
            file: assertions/assert-ready.yaml

    - name: reject-invalid-currency
      description: Verify that a BillingAccount with an invalid currency code is rejected.
      try:
        - create:
            file: test-data/invalid-currency.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'currencyCode')): true

    # Note: currencyCode immutability is enforced by the webhook, which
    # requires TLS certificates. This test is skipped when webhooks are not
    # deployed. See the webhook deployment overlay for full validation.

    - name: update-contact-info
      description: Verify that contact info can be updated on a Ready account.
      try:
        - apply:
            file: 03-account-with-contact.yaml
        - assert:
            timeout: 30s
            resource:
              apiVersion: billing.miloapis.com/v1alpha1
              kind: BillingAccount
              metadata:
                name: lifecycle-test-account
                namespace: default
              spec:
                contactInfo:
                  email: billing@example.com
                  name: Billing Department
