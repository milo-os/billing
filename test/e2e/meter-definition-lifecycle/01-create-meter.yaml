apiVersion: billing.miloapis.com/v1alpha1
kind: MeterDefinition
metadata:
  name: e2e-compute-cpu-seconds
spec:
  meterName: compute.miloapis.com/instance/cpu-seconds
  displayName: Compute Instance CPU Time
  description: E2E fixture for MeterDefinition lifecycle.
  phase: Published
  measurement:
    aggregation: Sum
    unit: s
    dimensions:
      - region
      - instance.type
  billing:
    consumedUnit: s
    pricingUnit: h
