apiVersion: billing.miloapis.com/v1alpha1
kind: MeterDefinition
metadata:
  name: e2e-compute-cpu-seconds
spec:
  meterName: compute.miloapis.com/instance/cpu-seconds/v2
  displayName: Compute Instance CPU Time (Updated)
  phase: Published
  measurement:
    aggregation: Sum
    unit: s
    dimensions:
      - region
      - instance.type
      - resource.tier
  billing:
    consumedUnit: s
    pricingUnit: h
