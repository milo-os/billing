---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: billingaccounts.billing.miloapis.com
spec:
  group: billing.miloapis.com
  names:
    kind: BillingAccount
    listKind: BillingAccountList
    plural: billingaccounts
    singular: billingaccount
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.currencyCode
      name: Currency
      type: string
    - jsonPath: .status.linkedProjectsCount
      name: Projects
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BillingAccount is the Schema for the billingaccounts API. It represents a
          billing entity within an organization that is responsible for paying for
          service consumption.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BillingAccountSpec defines the desired state of a BillingAccount.
            properties:
              contactInfo:
                description: ContactInfo defines the billing contact for notifications.
                properties:
                  email:
                    description: Email is the email address for billing notifications.
                    minLength: 1
                    type: string
                  name:
                    description: Name is the display name of the billing contact.
                    type: string
                required:
                - email
                type: object
              currencyCode:
                description: |-
                  CurrencyCode is the ISO 4217 currency code for this billing account.
                  This field is immutable once the account transitions past Provisioning phase.
                pattern: ^[A-Z]{3}$
                type: string
              paymentProfile:
                description: PaymentProfile references the payment method for this
                  billing account.
                properties:
                  externalID:
                    description: ExternalID is the reference to the payment profile
                      in the payment provider.
                    minLength: 1
                    type: string
                  type:
                    description: Type is the payment profile type (e.g., "CreditCard").
                    minLength: 1
                    type: string
                required:
                - externalID
                - type
                type: object
              paymentTerms:
                description: PaymentTerms defines the invoicing schedule for this
                  billing account.
                properties:
                  invoiceDayOfMonth:
                    default: 1
                    description: InvoiceDayOfMonth is the day of the month invoices
                      are generated.
                    format: int32
                    maximum: 28
                    minimum: 1
                    type: integer
                  invoiceFrequency:
                    default: Monthly
                    description: InvoiceFrequency determines how often invoices are
                      generated.
                    enum:
                    - Monthly
                    - Quarterly
                    - Annual
                    type: string
                  netDays:
                    default: 30
                    description: NetDays is the number of days after invoice date
                      that payment is due.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
            required:
            - currencyCode
            type: object
          status:
            description: BillingAccountStatus defines the observed state of a BillingAccount.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the billing
                  account's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              linkedProjectsCount:
                description: |-
                  LinkedProjectsCount is the number of projects currently bound to this
                  billing account.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase represents the current lifecycle phase of the billing
                  account.
                enum:
                - Provisioning
                - Ready
                - Incomplete
                - Suspended
                - Archived
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
