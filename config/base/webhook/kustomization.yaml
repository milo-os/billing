apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
# manifests.yaml is generated by controller-gen and should NOT be edited
# directly — `make manifests` will overwrite it. The patches below rewrite
# the hardcoded names that controller-gen produces so the rest of the bundle
# can use static `billing-*` references.
- manifests.yaml

# Teach kustomize about the webhook clientConfig.service.{name,namespace}
# field paths so the namespace transform handles them automatically.
configurations:
- kustomizeconfig.yaml

patches:
- patch: |-
    - op: replace
      path: /metadata/name
      value: billing-mutating
    - op: replace
      path: /webhooks/0/clientConfig/service/name
      value: billing-webhook
    - op: replace
      path: /webhooks/0/clientConfig/service/namespace
      value: billing-system
  target:
    kind: MutatingWebhookConfiguration
    name: mutating-webhook-configuration
- patch: |-
    - op: replace
      path: /metadata/name
      value: billing-validating
    - op: replace
      path: /webhooks/0/clientConfig/service/name
      value: billing-webhook
    - op: replace
      path: /webhooks/0/clientConfig/service/namespace
      value: billing-system
    - op: replace
      path: /webhooks/1/clientConfig/service/name
      value: billing-webhook
    - op: replace
      path: /webhooks/1/clientConfig/service/namespace
      value: billing-system
  target:
    kind: ValidatingWebhookConfiguration
    name: validating-webhook-configuration
