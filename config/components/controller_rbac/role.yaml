---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: billing
rules:
- apiGroups:
  - billing.miloapis.com
  resources:
  - billingaccountbindings
  - billingaccounts
  - meterdefinitions
  - monitoredresourcetypes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - billing.miloapis.com
  resources:
  - billingaccountbindings/finalizers
  - billingaccounts/finalizers
  - meterdefinitions/finalizers
  - monitoredresourcetypes/finalizers
  verbs:
  - update
- apiGroups:
  - billing.miloapis.com
  resources:
  - billingaccountbindings/status
  - billingaccounts/status
  - meterdefinitions/status
  - monitoredresourcetypes/status
  verbs:
  - get
  - patch
  - update
