apiVersion: billing.miloapis.com/v1alpha1
kind: MeterDefinition
metadata:
  labels:
    app.kubernetes.io/name: billing
    app.kubernetes.io/managed-by: kustomize
    services.miloapis.com/owner-service: assistant.miloapis.com
  name: assistant-conversation-output-tokens
spec:
  meterName: assistant.miloapis.com/conversation/output-tokens
  displayName: Assistant Output Tokens
  description: |
    Output tokens generated by the Datum Cloud AI assistant -- the
    number of tokens produced by the model per request, summed across
    the billing period. Includes any tokens emitted by extended
    thinking when enabled on the underlying model.
  phase: Draft
  measurement:
    aggregation: Sum
    unit: "{token}"
    dimensions:
      - model
      - region
  billing:
    consumedUnit: "{token}"
    pricingUnit: "k{token}"
  monitoredResourceTypes:
    - assistant.miloapis.com/Conversation
