apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector-agent
  namespace: vector-agent
  labels:
    app.kubernetes.io/name: vector-agent
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vector-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector-agent
    spec:
      serviceAccountName: vector-agent
      # Tolerate all taints so every node contributing usage events has an agent.
      # SRE may restrict to specific taints for environments with sensitive workloads.
      tolerations:
        - operator: Exists
      volumes:
        - name: config
          configMap:
            name: vector-agent-config
        - name: data
          hostPath:
            path: /var/lib/vector-agent
            type: DirectoryOrCreate
        - name: token
          projected:
            sources:
              - serviceAccountToken:
                  audience: billing-gateway
                  expirationSeconds: 3600
                  path: token
      containers:
        - name: vector
          image: timberio/vector:0.45.0-alpine
          args: ["--config", "/etc/vector/vector.toml"]
          env:
            - name: BILLING_GATEWAY_URL
              value: "https://billing-gateway.billing-system.svc.cluster.local:8080"
            - name: SERVICE_ACCOUNT_TOKEN_PATH
              value: /var/run/secrets/billing-gateway/token
          ports:
            - name: cloudevents
              containerPort: 9880
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/vector
            - name: data
              mountPath: /var/lib/vector
            - name: token
              mountPath: /var/run/secrets/billing-gateway
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
