apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Extends the production NATS dependency and patches out PodMonitor for CI
# environments where Prometheus CRDs are absent.
resources:
  - ../nats

patches:
  - patch: |-
      - op: replace
        path: /spec/values/podMonitor/enabled
        value: false
    target:
      kind: HelmRelease
      name: nats
