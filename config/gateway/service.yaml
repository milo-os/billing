apiVersion: v1
kind: Service
metadata:
  name: billing-gateway
  namespace: billing-system
  labels:
    app.kubernetes.io/name: billing
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app.kubernetes.io/name: billing
    app.kubernetes.io/component: gateway
  ports:
    - name: ingest
      port: 8080
      targetPort: ingest
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
